<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>БЕКТЕЙЛФАН</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body {
    margin:0; padding:0; height:100%; background:#000; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
  }
  #wrap {
    position:relative;
    width:100%; max-width:880px; aspect-ratio:640/480;
  }
  canvas {
    width:100%; height:100%;
    background:#000;
    image-rendering:pixelated;
    display:block;
  }
  #hint {
    position:fixed; bottom:6px; left:0; right:0; text-align:center;
    color:#555; font-family:'Press Start 2P', monospace; font-size:9px;
    pointer-events:none;
  }
  body.touch #hint { display:none; }

  /* ---------- оверлей загрузки / "нажми чтобы начать" ---------- */
  #gate {
    position:absolute; inset:0; background:#000; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:12px; text-align:center; gap:14px; z-index:20; cursor:pointer;
  }
  #gate.hidden { display:none; }
  #gate .blink { animation:blink 1s step-start infinite; color:#8fd2ea; }
  @keyframes blink { 50% { opacity:0; } }

  /* ---------- мобильные кнопки управления ---------- */
  #touchControls {
    position:absolute; inset:0; display:none; pointer-events:none; z-index:10;
  }
  body.touch #touchControls { display:block; }

  .tbtn {
    position:absolute; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.5);
    color:#fff; font-family:'Press Start 2P', monospace;
    border-radius:10px; -webkit-user-select:none;
  }
  .tbtn:active, .tbtn.active { background:rgba(143,210,234,0.35); border-color:#8fd2ea; }

  #dpad { position:absolute; left:4%; bottom:6%; width:130px; height:130px; }
  #dUp    { top:0;    left:35px; width:60px; height:44px; }
  #dDown  { bottom:0; left:35px; width:60px; height:44px; }
  #dLeft  { left:0;   top:43px;  width:44px; height:44px; }
  #dRight { right:0;  top:43px;  width:44px; height:44px; }

  #actionButtons { position:absolute; right:4%; bottom:6%; width:150px; height:130px; }
  #btnZ { position:absolute; right:0; bottom:36px; width:66px; height:66px; border-radius:50%; font-size:14px; }
  #btnX { position:absolute; right:76px; bottom:0; width:56px; height:56px; border-radius:50%; font-size:11px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="480"></canvas>

  <div id="touchControls">
    <div id="dpad">
      <div class="tbtn" id="dUp">▲</div>
      <div class="tbtn" id="dDown">▼</div>
      <div class="tbtn" id="dLeft">◀</div>
      <div class="tbtn" id="dRight">▶</div>
    </div>
    <div id="actionButtons">
      <div class="tbtn" id="btnZ">OK</div>
      <div class="tbtn" id="btnX">НАЗАД</div>
    </div>
  </div>

  <div id="gate"><div>ЗАГРУЗКА...</div></div>
</div>
<div id="hint">Стрелки — навигация · Z — подтвердить · X — назад</div>

<script src="game.js"></script>
</body>
</html>
